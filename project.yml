name: Astro-iOS-LLM
options:
  bundleIdPrefix: com.astro
targets:
  Astro-iOS-LLM:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - Sources/Astro-iOS-LLM
    settings:
      base:
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGN_ENTITLEMENTS: ""
        ENABLE_BITCODE: NO
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
    dependencies:
      - package: LocalLLMClient
        product: LocalLLMClient
      - package: LocalLLMClient
        product: LocalLLMClientLlama

packages:
  LocalLLMClient:
    url: https://github.com/tattn/LocalLLMClient.git
    branch: main
